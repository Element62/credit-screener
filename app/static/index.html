<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Screenr</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow brand">Credit Screen</p>
        </div>
        <button id="logoutButton" class="secondary hidden">Log out</button>
      </header>

      <section id="loginCard" class="card login-card">
        <h2>Sign in</h2>
        <form id="loginForm">
          <label>Username<input name="username" type="text" autocomplete="username" required /></label>
          <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
          <button type="submit">Enter dashboard</button>
          <p id="loginError" class="error hidden"></p>
        </form>
      </section>

      <main id="app" class="hidden">
        <section id="loadingBanner" class="card loading-banner hidden">
          <div class="loading-text">Loading...</div>
        </section>

        <section class="card">
          <div class="tab-strip">
            <button id="issuerTabButton" type="button" class="tab-button active">Issuer Screen</button>
            <button id="moversTabButton" type="button" class="tab-button">3M Price Movers</button>
          </div>
        </section>

        <div id="issuerTabPanel">
        <section class="card">
          <div class="toolbar">
            <div class="toolbar-group">
              <label>Search
                <div class="search-field">
                  <input id="searchInput" type="text" placeholder="Issuer name or ticker" />
                  <button id="clearSearchButton" type="button" class="clear-search hidden" aria-label="Clear search">X</button>
                </div>
              </label>
              <label>Sector<select id="sectorFilter"><option value="All">All</option></select></label>
            </div>
            <div class="toolbar-group">
              <label>Min issuer yield (%)<input id="issuerMinYieldInput" type="number" min="0" step="0.1" value="7" /></label>
              <label>Sort by<select id="sortField"><option value="Face ($BN)">Face ($BN)</option><option value="WA Price">WA Price</option><option value="WA Yield">WA Yield</option><option value="52W PEAK UPSIDE SECURED ($MM)" selected>52W PEAK UPSIDE SECURED ($MM)</option><option value="52W PEAK UPSIDE UNSECURED ($MM)">52W PEAK UPSIDE UNSECURED ($MM)</option></select></label>
              <label>Order<select id="sortDirection"><option value="desc">Descending</option><option value="asc">Ascending</option></select></label>
              <button id="downloadIssuersButton" type="button" class="secondary">Download Issuer View</button>
            </div>
          </div>
          <div id="statusBar" class="status-bar"></div>
        </section>

        <section class="card issuer-table-card">
          <div class="table-wrap issuer-table-wrap">
            <table>
              <thead id="issuerHead"></thead>
              <tbody id="issuerBody"></tbody>
            </table>
          </div>
        </section>

        <section id="reportSummaryCard" class="card report-summary hidden">
          <div class="detail-header">
            <div>
              <p class="eyebrow">Latest Report Summary</p>
              <p id="reportMeta" class="status-bar"></p>
            </div>
          </div>
          <ul id="reportBullets" class="report-bullets"></ul>
        </section>

        <section id="detailCard" class="card hidden">
          <div class="detail-header">
            <div>
              <p id="detailTicker" class="eyebrow"></p>
              <h2 id="detailTitle"></h2>
            </div>
            <div class="toolbar-group detail-filter-group">
              <label>Min yield (%)<input id="detailMinYieldInput" type="number" min="0" step="0.1" value="7" /></label>
              <button id="downloadDetailButton" type="button" class="secondary">Download Detail View</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="detailHead"></thead>
              <tbody id="detailBody"></tbody>
            </table>
          </div>
        </section>
        </div>

        <div id="moversTabPanel" class="hidden">
          <section class="card">
            <div class="detail-header">
              <div>
                <p class="eyebrow">3M Movers</p>
                <p id="moversStatus" class="status-bar"></p>
              </div>
              <div class="toolbar-group">
                <label>Direction
                  <select id="moversDirectionFilter">
                    <option value="all">Absolute Move &gt; 10</option>
                    <option value="down" selected>Price Move Down</option>
                    <option value="up">Price Move Up</option>
                  </select>
                </label>
                <label>Chart metric
                  <select id="moversChartMetric">
                    <option value="amount">Amount Out ($MM)</option>
                    <option value="count">Security Count</option>
                  </select>
                </label>
                <label>Sort by
                  <select id="moversSortField">
                    <option value="3M Price Move">3M Price Move</option>
                    <option value="Current Px">Current Px</option>
                  </select>
                </label>
                <label>Order
                  <select id="moversSortDirection">
                    <option value="desc">Descending</option>
                    <option value="asc">Ascending</option>
                  </select>
                </label>
              </div>
            </div>
            <div id="moversChart" class="sector-chart"></div>
          </section>

          <section class="card">
            <div class="table-wrap">
              <table>
                <thead id="moversHead"></thead>
                <tbody id="moversBody"></tbody>
              </table>
            </div>
          </section>
        </div>

      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
